<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Журнал оценок</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 20px;
        }
        h1 { color: #2c3e50; }
        h3 { color: #5c6bc0; margin-top: 30px; }
        
        form {
            display: inline-block;
            text-align: left;
            padding: 25px;
            background: #ffffff;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 300px;
        }
        label { display: block; margin-bottom: 15px; font-weight: 600; color: #555; }
        input[type="text"] {
            width: 93%;
            padding: 10px;
            margin-top: 5px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        input[type="submit"] {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: #5c6bc0;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        input[type="submit"]:hover { background: #3f51b5; }
        
        .grades {
            display: inline-block;
            text-align: left;
            background: white;
            padding: 20px 40px;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            min-width: 250px;
        }
        .grades li { padding: 8px 0; border-bottom: 1px solid #eee; }
        .grades li:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <h1>📋 Учет успеваемости</h1>
    <form method="POST">
        <label>Предмет: <input type="text" name="subject" required></label>
        <label>Оценка: <input type="text" name="grade" required></label>
        <input type="submit" value="Сохранить">
    </form>

    <h3>Список оценок:</h3>
    <ul class="grades">
        <paste>
    </ul>
</body>
</html>
